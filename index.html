        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>
</head>
<style>
    section{
        border: 1px solid black;
        height: 300px;
        width: 300px;
        background-color: blueviolet;
        position: relative;
    }
.div-1{
    position: absolute;
        height: 50px;
        width: 50px;
        background-color: rgb(255, 230, 0);
        color: white;
        top: 125px;
        left: 130px;
}
   
   .div-2{
    position: absolute;
        height: 50px;
        width: 50px;
        background-color: rgb(179, 255, 0);
        color: white;
        top:0 ;
    
}

.div-3{
    position: absolute;
        height: 50px;
        width: 50px;
        background-color: rgb(255, 123, 0);
        color: white;
        right: 0;
        bottom: 0;
}

.div-4{
    position: absolute;
        height: 50px;
        width: 50px;
        background-color: rgb(255, 0, 157);
        color: white;
        right:0;

}

.div-5{
    position: absolute;
        height: 50px;
        width: 50px;
        background-color: rgb(0, 255, 98);
        color: white;
        bottom: 0;
}


</style>
    <body>
            <section>
            <div class="div-1">1</div>
            <div class="div-2">2</div>
            <div class="div-3">3</div>
            <div class="div-4">4</div>
            <div class="div-5">5</div>
    </section>
       
</body>
      
    </html>
